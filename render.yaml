services:
  - type: web
    name: aether-realty-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: AETHER_DEV_MODE
        value: false
      - key: FRONTEND_URL
        value: https://aether-realty-demo.netlify.app
      - key: REALTOR_EMAIL
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
